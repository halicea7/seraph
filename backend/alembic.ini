[alembic]
# Path to the Alembic script directory
script_location = alembic

# Template for new revision files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for "create_date" in revision header
timezone = UTC

# max length of chars to apply to the "slug" field
truncate_slug_length = 40

# version path separator; used by multi-branch setups
version_path_separator = os

# Set to "true" to run the environment during the "revision" command,
# even when new revisions are being created.
# revision_environment = false

# set to 'true' to search source files recursively
# in each "version_locations" directory
# recursive_version_locations = false

# the output encoding used when writing revision files
# output_encoding = utf-8

# sqlalchemy.url is overridden in env.py from settings
sqlalchemy.url = sqlite:///./seraph.db


[post_write_hooks]
# Hooks to run after writing new revision files.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
