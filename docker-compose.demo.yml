version: '3.9'

# ─── Seraph Demo Stack ───────────────────────────────────────────────────────
# Runs the Seraph backend + frontend alongside intentionally vulnerable
# containers on an isolated 10.13.37.0/24 subnet. Targets appear in Seraph
# as real IPs so the demo feels like an actual engagement.
#
# IP layout:
#   10.13.37.10   DVWA          (web app — SQLi, XSS, brute force, etc.)
#   10.13.37.20   Juice Shop    (OWASP Top 10 challenges)
#   10.13.37.100  Metasploitable 2  (multi-service Linux host)
#
#   Start:    ./demo.sh          (recommended — seeds data automatically)
#   Manual:   docker compose -f docker-compose.demo.yml up -d --build
#   Teardown: docker compose -f docker-compose.demo.yml down -v

services:

  # ── Seraph backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - seraph_data:/app/data
      - seraph_results:/seraph_results
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - seraph_demo_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/projects"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Seraph frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - seraph_demo_net
    restart: unless-stopped

  # ── Damn Vulnerable Web Application — 10.13.37.10 ────────────────────────
  # Browse: http://localhost:8888  (admin / password)
  # Covers: SQLi, XSS, CSRF, file upload, command injection, brute force
  dvwa:
    image: vulnerables/web-dvwa
    ports:
      - "8888:80"
    networks:
      seraph_demo_net:
        ipv4_address: 10.13.37.10
    restart: unless-stopped

  # ── OWASP Juice Shop — 10.13.37.20 ───────────────────────────────────────
  # Browse: http://localhost:3001
  # Covers: OWASP Top 10, broken auth, insecure deserialization, XXE
  juiceshop:
    image: bkimminich/juice-shop
    ports:
      - "3001:3000"
    networks:
      seraph_demo_net:
        ipv4_address: 10.13.37.20
    restart: unless-stopped

  # ── Metasploitable 2 — 10.13.37.100 ──────────────────────────────────────
  # Full Linux host with dozens of deliberately vulnerable services.
  # No ports exposed to the host — internal network only.
  # SSH: msfadmin / msfadmin
  metasploitable:
    image: tleemcjr/metasploitable2
    networks:
      seraph_demo_net:
        ipv4_address: 10.13.37.100
    restart: unless-stopped

networks:
  seraph_demo_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.13.37.0/24

volumes:
  seraph_data:
  seraph_results:
