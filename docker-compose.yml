# Seraph — all-in-one API. One container serves the backend API on a single port,
# backed by SQLite. Just run:  ./setup.sh   (or: docker compose up -d --build)
#
# The frontend is the SeraphElectron desktop app: point its Connect screen at
# http://<host>:8000 (CORS already allows the desktop app; the port binds all
# interfaces). API docs at http://localhost:8000/docs.
# For the Postgres + nginx production stack, use docker-compose.prod.yml instead.

services:
  seraph:
    build:
      context: .
      dockerfile: Dockerfile.backend
    # Single worker, no --reload: avoids SQLite "database is locked" under
    # multiple workers and the dev reloader. Overrides the Dockerfile CMD.
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${SERAPH_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      SERAPH_DATABASE_URL: "sqlite:////data/seraph.db"
      PYTHONUNBUFFERED: "1"
    volumes:
      - seraph_data:/data
      - seraph_results:/seraph_results
      - seraph_reports:/app/reports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/auth/setup-required"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  seraph_data:
  seraph_results:
  seraph_reports:
