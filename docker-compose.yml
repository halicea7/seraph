# Seraph — all-in-one API. One container serves the backend API on a single port,
# backed by SQLite. Just run:  ./setup.sh   (or: docker compose up -d --build)
#
# The frontend is the SeraphElectron desktop app: point its Connect screen at
# http://<host>:8000 (CORS already allows the desktop app; the port binds all
# interfaces). API docs at http://localhost:8000/docs.
# HTTPS: run ./setup-https.sh first and the container starts on https:// instead.
# For the Postgres + nginx production stack, use docker-compose.prod.yml instead.

services:
  seraph:
    build:
      context: .
      dockerfile: Dockerfile.backend
    # The image entrypoint runs a single uvicorn worker (no SQLite lock contention)
    # and auto-enables HTTPS when ./certs is populated (see ./setup-https.sh).
    ports:
      - "${SERAPH_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      SERAPH_DATABASE_URL: "sqlite:////data/seraph.db"
      PYTHONUNBUFFERED: "1"
    volumes:
      - seraph_data:/data
      - seraph_results:/seraph_results
      - seraph_reports:/app/reports
      # Mount TLS certs read-only. Empty/absent → container serves plain HTTP.
      - ./certs:/certs:ro
    restart: unless-stopped
    # Works whether the container came up on HTTP or HTTPS (-k: self-signed CA).
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSk https://localhost:8000/api/v1/auth/setup-required || curl -fsS http://localhost:8000/api/v1/auth/setup-required"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  seraph_data:
  seraph_results:
  seraph_reports:
